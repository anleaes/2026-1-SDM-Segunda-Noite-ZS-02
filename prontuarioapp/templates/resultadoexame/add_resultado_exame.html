{% extends 'base.html' %}

{% block body %}

<h2>
    {% if form.instance.id %}
        Editar Resultado de Exame
    {% else %}
        Novo Resultado de Exame
    {% endif %}
</h2>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        {% if form.instance.id %}
            Atualizar
        {% else %}
            Salvar
        {% endif %}
    </button>
</form>

<br>

<a href="{% url 'resultadoexame:list_resultado_exame' %}">
    Voltar
</a>

{% endblock body %}
