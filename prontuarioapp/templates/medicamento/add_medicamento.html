{% extends 'base.html' %}

{% block body %}

<h2>
    {% if form.instance.id %}
        Editar Medicamento
    {% else %}
        Novo Medicamento
    {% endif %}
</h2>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        {% if form.instance.id %}
            Atualizar
        {% else %}
            Salvar
        {% endif %}
    </button>
</form>

<br>

<a href="{% url 'medicamento:list_medicamento' %}">
    Voltar
</a>

{% endblock body %}
